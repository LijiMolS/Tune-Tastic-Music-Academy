{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Tune Tastic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- External CSS -->
<link rel="stylesheet" href="{% static 'css/register.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

</head>
<body>

<div class="register-box">
    <h2>Join Tune Tastic</h2>
    <p>Create your account and start learning music today</p>

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required minlength="3">
        </div>
        <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" name="password1" placeholder="Password" required minlength="6">
        </div>
        <div class="input-group">
            <input type="password" name="password2" placeholder="Confirm Password" required minlength="6">
        </div>
        <button type="submit" class="btn-register" >Register</button>
    </form>

    <p class="login-link">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>
</div>

<!-- Messages container -->
<div id="django-messages" data-messages='[ 
    {% for message in messages %}
        {"text": "{{ message|escapejs }}", "tags": "{{ message.tags }}"}{% if not forloop.last %},{% endif %}
    {% endfor %}
]'></div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{% static 'js/register.js' %}"></script>
</body>
</html>
